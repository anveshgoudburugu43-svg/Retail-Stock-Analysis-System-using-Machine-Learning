{% extends 'base.html' %}
{% block content %}
<section class="max-w-3xl mx-auto mt-10 p-6 bg-white rounded-xl shadow">
  <h2 class="text-2xl font-bold mb-4">Record a Sale</h2>

  {% if messages %}
    <ul class="mb-4">
      {% for message in messages %}
        <li class="p-2 mb-2 rounded {{ message.tags }} bg-gray-100">{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  <form method="post" class="flex flex-col gap-4">
    {% csrf_token %}
    <div>
      <label class="block mb-1 font-semibold">Select Stock:</label>
      <select name="stock_id" required class="border p-2 rounded w-full">
        {% for stock in stocks %}
          <option value="{{ stock.id }}">{{ stock.symbol }} - {{ stock.company }} ({{ stock.quantity }} available)</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block mb-1 font-semibold">Quantity Sold:</label>
      <input type="number" name="quantity_sold" min="1" required class="border p-2 rounded w-full">
    </div>

    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Submit Sale</button>
  </form>
</section>
{% endblock %}
