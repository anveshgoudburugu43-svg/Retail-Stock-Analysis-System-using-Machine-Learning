<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
  <h1 class="text-2xl font-bold mb-6 text-center">Sign In</h1>
  {% for message in messages %}
    <div class="mb-4 text-red-600">{{ message }}</div>
  {% endfor %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-4">
      <label>Username</label>
      <input type="text" name="username" class="w-full border p-2 rounded">
    </div>
    <div class="mb-4">
      <label>Password</label>
      <input type="password" name="password" class="w-full border p-2 rounded">
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Sign In</button>
  </form>
  <p class="mt-4 text-center text-gray-600">Don't have an account? <a href="{% url 'signup' %}" class="text-blue-600">Sign Up</a></p>
</div>

</body>
</html>
